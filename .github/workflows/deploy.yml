name: Deploy

on:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/berlogastudio/berloganow-yandex-auth:latest
            ghcr.io/berlogastudio/berloganow-yandex-auth:${{ github.sha }}
          build-args: |
            REACT_APP_BOT_USERNAME=berloganowbot
            REACT_APP_BACKEND_URL=https://now.berloga.dev/yandex
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Dokploy redeploy
        env:
          DOKPLOY_URL: ${{ secrets.DOKPLOY_WEBHOOK_URL }}
        run: curl -s -o /dev/null -w "%{http_code}" -X POST "$DOKPLOY_URL"
