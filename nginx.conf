map $http_user_agent $is_healthcheck {
    default 0;
    "~*(Wget|kube-probe|Docker-HealthCheck)" 1;
}

# Log everything except Docker/Dokploy internal healthchecks.
map $is_healthcheck $loggable {
    0 1;
    1 0;
}

server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    access_log /var/log/nginx/access.log combined if=$loggable;

    # Block random path-scanning bots that never fetch index.html first —
    # saves on log noise and response bandwidth.
    location ~* (\.env|\.git|wp-admin|wp-login|phpmyadmin|\.php$) {
        return 444;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    location / {
        try_files $uri /index.html;
    }

    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the entry html.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
